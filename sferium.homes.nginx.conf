server {
    listen 80;
    listen [::]:80;
    server_name sferium.homes www.sferium.homes;

    # Автоматический редирект с HTTP на HTTPS (рекомендуется для продакшена)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sferium.homes www.sferium.homes;

    # SSL сертификаты Let's Encrypt (укажите правильные пути на сервере после генерации)
    ssl_certificate /etc/letsencrypt/live/sferium.homes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sferium.homes/privkey.pem;
    
    # Рекомендуемые настройки безопасности SSL от Let's Encrypt
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * blob: data:;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Сжатие Gzip для быстрой отдачи статики
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Ограничение размера загружаемых файлов
    client_max_body_size 50M;

    # --- 1. Статические файлы React (Фронтенд) ---
    # Для максимальной производительности Nginx отдает собранный дистрибутив напрямую без Node.js процесса
    location / {
        root /var/www/sferium/dist; # Путь к вашей собранной папке фронтенда
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Кэширование статических ассетов
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|otf|webp|json)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }
    }

    # --- 2. FastAPI REST API Proxy ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Настройки таймаутов
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- 3. WebSocket Шлюз Синхронизации (КРИТИЧЕСКИЙ ИСПРАВЛЕННЫЙ БЛОК) ---
    # Внимание: убран завершающий слэш из пути location, чтобы корректно обрабатывать параметры вида /ws?room_id=...
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        
        # Заголовки для Upgrade-соединения WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Передача реальных заголовков клиента
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключение буферизации для мгновенной синхронизации кадров плеера
        proxy_buffering off;
        
        # Увеличенные таймауты, чтобы соединение не рвалось при неактивности
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
